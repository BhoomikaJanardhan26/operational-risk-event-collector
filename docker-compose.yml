  #   container_name: risk-backend
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/risk_db
  #     - SPRING_DATA_REDIS_HOST=redis
  #     - AI_SERVICE_URL=http://ai-service:5000
  #   depends_on:
  #     - db
  #     - redis
  #     - ai-service

  # frontend:
  #   build: ./frontend
  #   container_name: risk-frontend
