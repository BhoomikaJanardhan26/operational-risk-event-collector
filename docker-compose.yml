version: '3.8'

services:
  db:
    image: postgres:15
    container_name: risk-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-risk_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: risk-redis
    ports:
      - "6379:6379"

  ai-service:
    build: .
    container_name: risk-ai-service
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - redis

  # backend:
